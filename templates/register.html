<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>注册 - 小型书籍管理系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center" style="height:100vh;">
  <div class="card shadow p-4" style="width: 420px;">
    <h3 class="text-center mb-3">注册新用户</h3>
    <div id="errorBox" class="alert alert-danger d-none" role="alert"></div>
    <div id="successBox" class="alert alert-success d-none" role="alert"></div>

    <form action="/register" method="POST" novalidate>
      <div class="mb-3">
        <label class="form-label">用户名</label>
        <input type="text" name="username" class="form-control" required placeholder="请输入用户名">
      </div>
      <div class="mb-3">
        <label class="form-label">密码</label>
        <input type="password" name="password" class="form-control" required placeholder="请输入密码">
      </div>
      <div class="mb-3">
        <label class="form-label">昵称</label>
        <input type="text" name="nickname" class="form-control" placeholder="可选，默认与用户名相同">
      </div>
      <div class="mb-3">
        <label class="form-label">性别</label>
        <select name="gender" class="form-select">
          <option value="其他" selected>其他</option>
          <option value="男">男</option>
          <option value="女">女</option>
        </select>
      </div>
      <button class="btn btn-success w-100" type="submit">注册</button>
    </form>
    <div class="mt-3 text-center">
      <a href="/">已有账号？返回登录</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    (function showQueryMessages(){
      const params = new URLSearchParams(window.location.search);
      const err = params.get('error');
      const ok = params.get('success');
      if (err) {
        const box = document.getElementById('errorBox');
        box.textContent = decodeURIComponent(err);
        box.classList.remove('d-none');
      }
      if (ok) {
        const box = document.getElementById('successBox');
        box.textContent = decodeURIComponent(ok);
        box.classList.remove('d-none');
      }
    })();
  </script>
</body>
</html>
